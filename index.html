<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bac Bo Elite V5.5</title>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #facc15;
            --text-muted: #94a3b8;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: white;
            font-family: system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container { flex: 1; padding: 10px; overflow-y: auto; padding-bottom: 260px; }

        /* DASHBOARD */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-val { font-size: 15px; font-weight: bold; display: block; color: #fff; }
        .stat-label { font-size: 8px; color: var(--text-muted); text-transform: uppercase; }

        /* MONITOR DE ESTRATÉGIA */
        .monitor {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #334155;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sinal-forte { border-color: var(--success); box-shadow: 0 0 25px rgba(34, 197, 94, 0.3); }
        .sinal-risco { border-color: var(--danger); }

        #previsao { font-size: 38px; font-weight: 900; margin: 5px 0; text-transform: uppercase; }
        #status-entrada { font-size: 11px; font-weight: 800; padding: 5px 15px; border-radius: 50px; display: inline-block; background: #334155; }

        /* LISTA DE ESTRATÉGIAS DETECTADAS */
        .estrategias-lista {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
        }
        .tag-estrategia { font-size: 9px; padding: 3px 8px; background: rgba(255,255,255,0.1); border-radius: 4px; color: var(--text-muted); }
        .tag-ativa { background: var(--accent); color: white; }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 12px; }
        .celula { aspect-ratio: 1; border-radius: 5px; border: 1px solid rgba(255,255,255,0.05); }

        /* DOCK */
        .dock { position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a; padding: 15px 20px 25px; border-top: 1px solid #334155; }
        .botoes-principais { display: flex; justify-content: space-around; align-items: center; margin-bottom: 15px; }
        .btn-cor { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; transition: 0.1s; }
        .btn-cor:active { transform: scale(0.9); }
        .azul { background: var(--accent); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .amarelo { background: var(--warning); width: 80px; height: 80px; box-shadow: 0 4px 20px rgba(250, 204, 21, 0.4); }
        .vermelho { background: var(--danger); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }

        .controles-aux { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-sec { background: #1e293b; color: white; border: 1px solid #334155; padding: 12px; border-radius: 10px; font-size: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="dashboard">
            <div class="stat-card">
                <span class="stat-label">Win Rate</span>
                <span class="stat-val" id="winrate">0%</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Tendência</span>
                <span class="stat-val" id="tendencia">-</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Gale Sugerido</span>
                <span class="stat-val" id="gale">G0</span>
            </div>
        </div>

        <div class="monitor" id="monitor">
            <div id="status-entrada">ANALISANDO PADRÕES</div>
            <div id="previsao">---</div>
            
            <div class="estrategias-lista" id="tags">
                <span class="tag-estrategia" id="tag-onda">Surfar Onda</span>
                <span class="tag-estrategia" id="tag-quebra">Quebra Ciclo</span>
                <span class="tag-estrategia" id="tag-alternancia">Alternância</span>
            </div>
        </div>

        <div class="grid" id="grid"></div>
    </div>

    <div class="dock">
        <div class="botoes-principais">
            <button class="btn-cor azul" onclick="jogar('z')"></button>
            <button class="btn-cor amarelo" onclick="jogar('x')"></button>
            <button class="btn-cor vermelho" onclick="jogar('c')"></button>
        </div>
        <div class="controles-aux">
            <button class="btn-sec" onclick="desfazer()">↩️ Voltar</button>
            <button class="btn-sec" onclick="importar()" style="background:#14532d; border:none;">📥 Importar</button>
            <button class="btn-sec" onclick="reset()">🗑️ Reset</button>
        </div>
    </div>

<script>
    let hist = JSON.parse(localStorage.getItem("bacbo_hist")) || [];
    let wins = parseInt(localStorage.getItem("bacbo_wins")) || 0;
    let total = parseInt(localStorage.getItem("bacbo_total")) || 0;
    let ultimaPrev = null;

    function salvar() {
        localStorage.setItem("bacbo_hist", JSON.stringify(hist));
        localStorage.setItem("bacbo_wins", wins);
        localStorage.setItem("bacbo_total", total);
    }

    function jogar(cor) {
        if (ultimaPrev && hist.length >= 4) {
            total++;
            if (cor === ultimaPrev) wins++;
        }
        hist.push(cor);
        salvar();
        atualizar();
    }

    // ESTRATÉGIAS DO EBOOK
    function analisarEstrategias() {
        if (hist.length < 4) return { acao: "AGUARDAR", cor: null, tags: [] };
        
        let tags Ativas = [];
        let r = hist.slice(-4);
        let ultima = hist[hist.length-1];
        
        // 1. Estratégia "Surfar a Onda" (Repetição)
        let repetição = hist.slice(-3).every(v => v === ultima);
        if (repetição) tagsAtivas.push("onda");

        // 2. Estratégia "Alternância" (Z-C-Z-C)
        let alternando = (r[0] !== r[1] && r[1] !== r[2] && r[2] !== r[3]);
        if (alternando) tagsAtivas.push("alternancia");

        // 3. Estratégia "Quebra de 4"
        let sequenciaLonga = 0;
        for(let i=hist.length-1; i>=0; i--) {
            if(hist[i] === ultima) sequenciaLonga++; else break;
        }
        if (sequenciaLonga >= 4) tagsAtivas.push("quebra");

        // Lógica de Decisão
        if (sequenciaLonga >= 4) return { acao: "ENTRAR", cor: (ultima === 'z' ? 'c' : 'z'), tags: tagsAtivas };
        if (repetição) return { acao: "ENTRAR", cor: ultima, tags: tagsAtivas };
        if (alternando) return { acao: "ENTRAR", cor: (ultima === 'z' ? 'c' : 'z'), tags: tagsAtivas };

        return { acao: "ANALISANDO", cor: ultima, tags: tagsAtivas };
    }

    function atualizar() {
        const res = analisarEstrategias();
        ultimaPrev = res.cor;

        // UI Updates
        document.getElementById("winrate").innerText = total > 0 ? ((wins/total)*100).toFixed(0) + "%" : "0%";
        document.getElementById("previsao").innerText = res.cor ? traduzir(res.cor) : "---";
        
        const mon = document.getElementById("monitor");
        const st = document.getElementById("status-entrada");
        
        // Reset tags
        document.querySelectorAll(".tag-estrategia").forEach(t => t.classList.remove("tag-ativa"));
        res.tags.forEach(t => document.getElementById("tag-"+t).classList.add("tag-ativa"));

        if (res.acao === "ENTRAR") {
            st.innerText = "✅ ENTRADA CONFIRMADA";
            st.style.background = "var(--success)";
            mon.className = "monitor sinal-forte";
        } else {
            st.innerText = "⏳ AGUARDAR PADRÃO";
            st.style.background = "#334155";
            mon.className = "monitor";
        }

        // Tendência
        let z = hist.filter(x => x === 'z').length;
        let c = hist.filter(x => x === 'c').length;
        document.getElementById("tendencia").innerText = z > c ? "Azul" : "Verm.";

        desenhar();
    }

    function desenhar() {
        const g = document.getElementById("grid");
        g.innerHTML = "";
        hist.slice(-40).forEach(c => {
            let d = document.createElement("div");
            d.className = "celula";
            d.style.background = c === 'z' ? 'var(--accent)' : c === 'c' ? 'var(--danger)' : 'var(--warning)';
            g.appendChild(d);
        });
    }

    function traduzir(c) { return c === 'z' ? 'Azul' : c === 'c' ? 'Vermelho' : 'Empate'; }
    function desfazer() { hist.pop(); salvar(); atualizar(); }
    function reset() { if(confirm("Resetar?")) { localStorage.clear(); location.reload(); } }
    function importar() { 
        let s = prompt("Sequência (ex: zzc):"); 
        if(s) { s.toLowerCase().split('').forEach(l => { if(['z','x','c'].includes(l)) hist.push(l); }); salvar(); atualizar(); } 
    }

    atualizar();
</script>
</body>
</html>
