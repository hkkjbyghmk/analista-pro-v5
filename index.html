<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Analista Pro V5.3 - REPARADO</title>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #facc15;
            --text-muted: #94a3b8;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            padding-bottom: 260px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .stat-card {
            background: var(--card);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-val { font-size: 16px; font-weight: bold; display: block; color: #fff; }
        .stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; }

        .monitor {
            background: #0f172a;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #1e293b;
            transition: all 0.3s ease;
        }

        .sinal-verde { border-color: var(--success); box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        .sinal-alerta { border-color: var(--danger); box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }

        #previsao { font-size: 36px; font-weight: 900; margin: 10px 0; color: #fff; }
        #status-entrada { 
            font-weight: bold; 
            font-size: 12px; 
            padding: 6px 16px; 
            border-radius: 50px; 
            display: inline-block;
            background: #334155;
            color: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
            margin-top: 15px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
        }
        .celula { aspect-ratio: 1; border-radius: 6px; }

        .dock {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0f172a;
            padding: 20px;
            border-top: 1px solid #334155;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .botoes-principais {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-cor { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; transition: transform 0.1s; }
        .btn-cor:active { transform: scale(0.9); }
        .azul { background: var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .amarelo { background: var(--warning); width: 85px; height: 85px; box-shadow: 0 0 20px rgba(250, 204, 21, 0.4); }
        .vermelho { background: var(--danger); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }

        .controles-aux { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-sec { 
            background: #1e293b; 
            color: white; 
            border: 1px solid #334155; 
            padding: 12px; 
            border-radius: 10px; 
            font-size: 11px; 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="dashboard">
            <div class="stat-card">
                <span class="stat-label">Taxa Acerto</span>
                <span class="stat-val" id="assertividade">0%</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Sequência</span>
                <span class="stat-val" id="seq-atual">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Padrões</span>
                <span class="stat-val" id="padrao-count">0</span>
            </div>
        </div>

        <div class="monitor" id="monitor">
            <div id="status-entrada">A AGUARDAR DADOS</div>
            <div id="previsao">---</div>
            <div id="info-quebra" style="font-size: 11px; margin-top: 8px; color: var(--text-muted);">Insira pelo menos 5 cores</div>
        </div>

        <div class="grid" id="grid"></div>
    </div>

    <div class="dock">
        <div class="botoes-principais">
            <button class="btn-cor azul" onclick="jogar('z')"></button>
            <button class="btn-cor amarelo" onclick="jogar('x')"></button>
            <button class="btn-cor vermelho" onclick="jogar('c')"></button>
        </div>
        <div class="controles-aux">
            <button class="btn-sec" onclick="desfazer()">↩️ Voltar</button>
            <button class="btn-sec" onclick="importarSequencia()" style="background: #14532d; border: none;">📥 Importar</button>
            <button class="btn-sec" onclick="limparTudo()" style="color: var(--danger)">🗑️ Reset</button>
        </div>
    </div>

<script>
    // Inicialização segura
    let historico = JSON.parse(localStorage.getItem("historico")) || [];
    let memoria = JSON.parse(localStorage.getItem("memoria")) || {};
    let acertos = parseInt(localStorage.getItem("acertos")) || 0;
    let totalPrevisoes = parseInt(localStorage.getItem("totalPrevisoes")) || 0;
    let ultimaPrevisao = null;

    function salvar() {
        localStorage.setItem("historico", JSON.stringify(historico));
        localStorage.setItem("memoria", JSON.stringify(memoria));
        localStorage.setItem("acertos", acertos.toString());
        localStorage.setItem("totalPrevisoes", totalPrevisoes.toString());
    }

    function jogar(cor) {
        // Valida acerto antes de adicionar a nova cor
        if (ultimaPrevisao !== null && historico.length >= 5) {
            totalPrevisoes++;
            if (cor === ultimaPrevisao) acertos++;
        }

        historico.push(cor);
        aprender();
        salvar();
        atualizarUI();
    }

    function aprender() {
        if (historico.length < 3) return;
        for (let tam = 2; tam <= 4; tam++) {
            if (historico.length > tam) {
                let p = historico.slice(-(tam + 1), -1).join("");
                let r = historico[historico.length - 1];
                if (!memoria[p]) memoria[p] = {z:0, c:0, x:0};
                memoria[p][r]++;
            }
        }
    }

    function prever() {
        if (historico.length < 5) return null;
        
        // Estratégia de Espelho
        const seq1 = historico.slice(-3).join("");
        const seq2 = historico.slice(-6, -3).reverse().join("");
        if (seq1 === seq2 && seq1.length === 3) {
            const oposto = { 'z': 'c', 'c': 'z', 'x': 'x' };
            return oposto[historico[historico.length-1]];
        }

        // Cadeia de Markov
        for (let tam = 4; tam >= 2; tam--) {
            let p = historico.slice(-tam).join("");
            if (memoria[p]) {
                let d = memoria[p];
                return Object.keys(d).reduce((a, b) => d[a] > d[b] ? a : b);
            }
        }
        return historico[historico.length-1];
    }

    function atualizarUI() {
        const taxa = totalPrevisoes > 0 ? ((acertos / totalPrevisoes) * 100).toFixed(1) : 0;
        const prev = prever();
        ultimaPrevisao = prev;

        // Calcular Sequência
        let seq = 0;
        if (historico.length > 0) {
            let ultima = historico[historico.length - 1];
            for (let i = historico.length - 1; i >= 0; i--) {
                if (historico[i] === ultima) seq++; else break;
            }
        }

        document.getElementById("assertividade").innerText = taxa + "%";
        document.getElementById("seq-atual").innerText = seq;
        document.getElementById("padrao-count").innerText = Object.keys(memoria).length;

        const mon = document.getElementById("monitor");
        const statusEntrada = document.getElementById("status-entrada");
        const prevTxt = document.getElementById("previsao");
        const infoQuebra = document.getElementById("info-quebra");

        if (historico.length < 5) {
            statusEntrada.innerText = "COLETANDO DADOS";
            statusEntrada.style.background = "#334155";
            prevTxt.innerText = "---";
            mon.className = "monitor";
        } else {
            prevTxt.innerText = traduzir(prev).toUpperCase();
            
            if (seq >= 4) {
                statusEntrada.innerText = "⚠️ AGUARDAR QUEBRA";
                statusEntrada.style.background = "#ef4444";
                infoQuebra.innerText = "Sequência muito longa detectada";
                mon.className = "monitor sinal-alerta";
            } else if (taxa >= 50 || totalPrevisoes < 5) {
                statusEntrada.innerText = "✅ ENTRADA CONFIRMADA";
                statusEntrada.style.background = "#22c55e";
                infoQuebra.innerText = "Padrão estatístico favorável";
                mon.className = "monitor sinal-verde";
            } else {
                statusEntrada.innerText = "⏳ MERCADO INSTÁVEL";
                statusEntrada.style.background = "#64748b";
                infoQuebra.innerText = "Aguardando melhor assertividade";
                mon.className = "monitor";
            }
        }
        desenharGrid();
    }

    function desenharGrid() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        historico.slice(-30).forEach(c => {
            let div = document.createElement("div");
            div.className = "celula";
            div.style.background = c === 'z' ? 'var(--accent)' : c === 'c' ? 'var(--danger)' : 'var(--warning)';
            grid.appendChild(div);
        });
    }

    function importarSequencia() {
        const input = prompt("Cole as letras (ex: zxczz):");
        if (input) {
            const letras = input.toLowerCase().replace(/[^zxc]/g, '').split('');
            letras.forEach(l => {
                historico.push(l);
                aprender();
            });
            salvar();
            atualizarUI();
        }
    }

    function traduzir(c) { return c === "z" ? "Azul" : c === "c" ? "Vermelho" : "Amarelo"; }
    function desfazer() { historico.pop(); salvar(); atualizarUI(); }
    function limparTudo() { if (confirm("Resetar tudo?")) { localStorage.clear(); location.reload(); } }

    // Inicializar UI
    atualizarUI();
</script>
</body>
</html>
